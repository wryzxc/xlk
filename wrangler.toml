name = "xlk"
compatibility_date = "2024-01-01"

# 注意：EdgeOne Pages 不支持 Python 运行时直接部署
# 本项目使用 Pages Functions (JavaScript/TypeScript) 或需要转换为 Workers 部署
# 以下配置适用于 Workers 部署方式

[build]
command = ""

# 环境变量（通过控制台设置，不要在此写入真实值）
[vars]
PYTHON_VERSION = "3.10"

# 静态资源缓存规则
[[rules]]
type = "CacheRule"
glob = "static/**/*"
ttl = 31536000
