services:
  - type: web
    name: python-learning-platform
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///platform.db
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1
