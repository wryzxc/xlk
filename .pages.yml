# EdgeOne Pages 部署配置文件
# 项目: xlk
# 说明: Python Flask 项目需要特殊部署方式

# 构建设置
build:
  # 构建命令
  # 注意: EdgeOne Pages 原生支持 Node.js 运行时
  # Python 项目需要通过以下方式之一部署:
  # 1. 使用 Docker 容器部署到 EdgeOne Pages
  # 2. 转换为 Workers 部署 (使用 Python Workers 支持)
  # 3. 使用外部服务器 + Pages 前端
  command: |
    echo "Python project - see deployment guide"
  
  # 构建输出目录
  output_dir: "."

# 路由规则
routes:
  # 静态资源缓存
  - pattern: "/static/*"
    cache:
      ttl: 31536000
      browser_ttl: 31536000
  
  # 主应用路由
  - pattern: "/*"
    target: "app"

# 重定向规则
redirects:
  # HTTP 到 HTTPS 重定向
  - from: "http://*"
    to: "https://$1"
    status: 301

# 头部设置
headers:
  # 全局安全头
  - pattern: "/*"
    headers:
      X-Content-Type-Options: "nosniff"
      X-Frame-Options: "SAMEORIGIN"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Permissions-Policy: "geolocation=(), microphone=(), camera=()"
  
  # 静态资源跨域头
  - pattern: "/static/*"
    headers:
      Access-Control-Allow-Origin: "*"
