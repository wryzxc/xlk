# EdgeOne Pages 部署配置文件
# 文档: https://edgeone.ai/document/2145346

# 构建设置
build:
  # 构建命令（EdgeOne Pages 使用 Python 运行时）
  command: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    python init_db.py
  
  # 构建输出目录（Flask 应用不需要静态构建输出）
  output_dir: "."
  
  # 环境变量
  environment:
    PYTHON_VERSION: "3.10"
    FLASK_ENV: "production"

# 部署设置
deploy:
  # 入口文件
  entry: "app.py"
  
  # 运行时
  runtime: "python"
  
  # 实例规格
  instance:
    memory: "512MB"
    timeout: "30s"

# 路由规则
routes:
  # 静态资源缓存
  - pattern: "/static/*"
    cache:
      ttl: 31536000
      browser_ttl: 31536000
  
  # API 路由（不缓存）
  - pattern: "/api/*"
    cache:
      ttl: 0
  
  # 主应用路由
  - pattern: "/*"
    target: "app"

# 重定向规则
redirects:
  # HTTP 到 HTTPS 重定向
  - from: "http://*"
    to: "https://$1"
    status: 301

# 头部设置
headers:
  # 全局安全头
  - pattern: "/*"
    headers:
      X-Content-Type-Options: "nosniff"
      X-Frame-Options: "SAMEORIGIN"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Permissions-Policy: "geolocation=(), microphone=(), camera=()"
  
  # 静态资源跨域头
  - pattern: "/static/*"
    headers:
      Access-Control-Allow-Origin: "*"

# 错误页面
error_pages:
  404:
    path: "/templates/404.html"
  500:
    path: "/templates/500.html"
