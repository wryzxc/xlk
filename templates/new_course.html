{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h1 class="page-title">创建新课程</h1>
    
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">课程标题</label>
                    <input type="text" class="form-control" name="title" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">课程描述</label>
                    <textarea class="form-control" name="description" rows="3" required></textarea>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">分类</label>
                        <select class="form-select" name="category" required>
                            <option value="基础">基础</option>
                            <option value="进阶">进阶</option>
                            <option value="高级">高级</option>
                            <option value="应用">应用</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">难度</label>
                        <select class="form-select" name="level" required>
                            <option value="beginner">入门</option>
                            <option value="intermediate">进阶</option>
                            <option value="advanced">高级</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">课程内容</label>
                    <textarea class="form-control" name="content" rows="10" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">创建课程</button>
                <a href="{{ url_for('admin_panel') }}" class="btn btn-secondary">取消</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
